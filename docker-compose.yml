services:
  nvd-bot:
    build:
      context: .
      network: host
    container_name: nvd_bot
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID}
      - NVD_API_KEY=${NVD_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # LLM — pick ONE option:
      # Option A: OpenRouter (hosted, 200+ models)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Option B: LiteLLM Proxy (self-hosted)
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL}
      # GitHub OAuth App (optional — enables /connectgit Device Flow for github.com)
      # Register at https://github.com/settings/developers, enable "Device Authorization Grant"
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
    volumes:
      - ./data:/app/data
